name: "Publish TranslationTools Dotnet Tool"

on:
   workflow_dispatch:
   push:
      branches:
      - master
      paths:
      - "nuget/mvdmio.TranslationTools.Tool/**"
      - "nuget/mvdmio.TranslationTools.Client/**"
      - "nuget/mvdmio.TranslationTools.Client.SourceGenerator/**"
      - "test/TranslationTools/mvdmio.TranslationTools.Tool.Tests.Unit/**"

jobs:
   Publish_TranslationTools_Tool:
      runs-on: ubuntu-22.04
      steps:
      -  uses: actions/checkout@v4

      -  name: Setup NuGet.exe for use with actions
         uses: nuget/setup-nuget@v2
         with:
            nuget-api-key: ${{secrets.NUGET_API_KEY}}
            nuget-version: 'latest'

      -  name: Setup .NET
         uses: actions/setup-dotnet@v4
         with:
            dotnet-version: 10.0.x

      -  name: Restore package and tests
         run: |
            dotnet restore nuget/mvdmio.TranslationTools.Tool/mvdmio.TranslationTools.Tool.csproj
            dotnet restore test/TranslationTools/mvdmio.TranslationTools.Tool.Tests.Unit/mvdmio.TranslationTools.Tool.Tests.Unit.csproj

      -  name: Build package
         run: dotnet build nuget/mvdmio.TranslationTools.Tool/mvdmio.TranslationTools.Tool.csproj --configuration Release --no-restore

      -  name: Test tool package
         run: dotnet test test/TranslationTools/mvdmio.TranslationTools.Tool.Tests.Unit/mvdmio.TranslationTools.Tool.Tests.Unit.csproj --configuration Release --no-restore --verbosity normal

      -  name: Pack and publish package
         run: |
            dotnet pack nuget/mvdmio.TranslationTools.Tool/mvdmio.TranslationTools.Tool.csproj --configuration Release --no-build -o ./artifacts
            nuget push ./artifacts/*.nupkg -Source 'https://api.nuget.org/v3/index.json' -NonInteractive -SkipDuplicate -Verbosity normal
